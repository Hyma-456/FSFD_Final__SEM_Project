services:
  # 1. Node.js Backend
  - type: web
    name: research-collab-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: PORT
        value: 5000

  # 2. React Frontend (Static Site)
  - type: static
    name: research-collab-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
