[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to the Render backend
[[redirects]]
  from = "/api/*"
  to = "https://research-collab-api-v1.onrender.com/api/:splat"
  status = 200
  force = true

# Fallback for React Router (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
